# GitHub Pages 정적 배포 (Actions → Settings → Pages → Source: GitHub Actions)
# Project Pages URL: https://<owner>.github.io/<repo>/
# 커스텀 도메인(루트)만 쓸 경우: 아래 Build env의 VITE_BASE·VITE_BASENAME 제거 후 저장소에서 빌드.

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Vite asset base & React Router basename (Project Pages 서브경로)
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_BASENAME: /${{ github.event.repository.name }}
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
